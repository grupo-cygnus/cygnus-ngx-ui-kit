<div class="flex items-center gap-4 w-full">
  <div class="h-4 w-full bg-gray-200 rounded-full overflow-hidden dark:bg-gray-700">
    <div
      class="h-full transition-colors duration-500 ease-out"
      [style.width.%]="value()"
      [class]="colorClass()"
    ></div>
  </div>

  <span class="text-sm font-medium text-gray-700 dark:text-gray-300 min-w-[3ch]">
    {{ value() }}%
  </span>
</div>
